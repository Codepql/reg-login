spring.application.name=reg-login

# 服务器端口（默认8080）
server.port=8080

# 数据库连接（MySQL）
spring.datasource.url=jdbc:mysql://mysql:3306/reg_login?useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=123456
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# mybatis开启驼峰命名自动转换（userName <-> user_name）
mybatis.configuration.map-underscore-to-camel-case=true

# 上传文件最大大小
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# 上传目录
file.upload-path=/app/upload/

# redis
spring.data.redis.host=redis
spring.data.redis.port=6379